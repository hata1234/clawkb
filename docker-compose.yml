services:
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: clawkb
      POSTGRES_PASSWORD: clawkb
      POSTGRES_DB: clawkb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawkb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3500:3500"
    environment:
      DATABASE_URL: "postgresql://clawkb:clawkb@db:5432/clawkb"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-change-me-in-production}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3500}"
      API_TOKEN: "${API_TOKEN:-change-me-in-production}"
      SEED_USERNAME: "${SEED_USERNAME:-admin}"
      SEED_PASSWORD: "${SEED_PASSWORD:-change-me-on-first-login}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
